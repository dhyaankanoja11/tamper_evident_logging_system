name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Build core packages
      run: |
        npm run build --prefix packages/types
        npm run build --prefix packages/crypto
        npm run build --prefix packages/core
        npm run build --prefix packages/storage
        
    - name: Build Web App
      run: npm run build --prefix apps/web
      
    - name: Build API
      run: npm run build --prefix apps/api || true

    - name: Run Tests
      run: npm test --if-present
